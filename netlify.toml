[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"

# Сначала перенаправляем ботов на функцию
[[redirects]]
  from = "/*"
  to = "/.netlify/functions/og?path=:splat"
  status = 200
  force = true
  conditions = { UserAgent = "Googlebot|YandexBot|Twitterbot|facebookexternalhit|TelegramBot|WhatsApp|Slackbot|Discordbot" }

# Все остальные запросы (обычные пользователи) идут на index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
