[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"

# Сначала обрабатываем sitemap.xml
[[redirects]]
  from = "/sitemap.xml"
  to = "/.netlify/functions/sitemap"
  status = 200

# Поисковые боты перенаправляются в функцию og.js
[[redirects]]
  from = "/*"
  to = "/.netlify/functions/og?path=:splat"
  status = 200
  force = true
  conditions = { UserAgent = "Googlebot|YandexBot|Twitterbot|facebookexternalhit|TelegramBot|WhatsApp|Slackbot|Discordbot" }

# Обычные пользователи получают React-приложение
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
