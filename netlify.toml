[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"

# Только поисковые боты идут в функцию
[[redirects]]
  from = "/*"
  to = "/.netlify/functions/og?path=:splat"
  status = 200
  force = true
  conditions = { UserAgent = "Googlebot|YandexBot|Twitterbot|facebookexternalhit|TelegramBot|WhatsApp|Slackbot|Discordbot" }

# Все остальные (обычные пользователи) получают React-приложение
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
