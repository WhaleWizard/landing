[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"

# SPA редирект (для обычных пользователей)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Перенаправление ботов на функцию og
[[redirects]]
  from = "/*"
  to = "/.netlify/functions/og?path=:splat"
  status = 200
  force = true
  conditions = { UserAgent = "Googlebot|YandexBot|Twitterbot|facebookexternalhit|TelegramBot|WhatsApp|Slackbot|Discordbot" }
